name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quasar_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache-dependency-path: quasar_backend/go.sum
      - run: go test ./... -count=1 -short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: quasar_frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: quasar_frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
