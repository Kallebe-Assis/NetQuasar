<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetQuasar</title>
    <link rel="icon" type="image/png" href="/Logo-NetQuasar%20II.png" />
    <link rel="apple-touch-icon" href="/Logo-NetQuasar%20II.png" />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("netquasar-ui-theme");
          document.documentElement.setAttribute("data-theme", t === "light" ? "light" : "dark");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
